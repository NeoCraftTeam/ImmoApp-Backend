# ============================================================
# PREPROD — Services applicatifs uniquement
# ============================================================
# DB, Redis et Meilisearch sont partagés avec la prod
# (containers keyhome-prod-db, keyhome-prod-redis, keyhome-prod-meilisearch)
# via le réseau externe keyhome_keyhome-network.
#
# Utilisation : placé dans /opt/keyhome-preprod/
# Les variables sont lues depuis /opt/keyhome-preprod/.env
# ============================================================

services:
  code-sync:
    image: ${APP_IMAGE:-keyhome-backend}
    container_name: ${COMPOSE_PREFIX:-keyhome-preprod}-code-sync
    command: sh -c "rm -rf /shared-code/bootstrap/cache/* && cp -rp /var/www/. /shared-code/ && chmod -R 755 /shared-code && chown -R 1000:1000 /shared-code"
    volumes:
      - preprod-app-code:/shared-code
    networks:
      - preprod-network

  app:
    image: ${APP_IMAGE:-keyhome-backend}
    container_name: ${COMPOSE_PREFIX:-keyhome-preprod}-backend
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      code-sync:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - preprod-app-code:/var/www
      - preprod-storage-data:/var/www/storage
      - ./.env:/var/www/.env
    networks:
      - preprod-network
      - keyhome-prod-network
    environment:
      - APP_ENV=${APP_ENV:-staging}
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
      - NIGHTWATCH_INGEST_URI=nightwatch-agent:2407
    # FIX: healthcheck manquant — web et worker ne peuvent pas dépendre de app proprement sans ça
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'php-fpm' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    image: ${APP_IMAGE:-keyhome-backend}
    container_name: ${COMPOSE_PREFIX:-keyhome-preprod}-worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --queue=emails,default --tries=3 --timeout=90
    # FIX: depends_on sans condition → le worker pouvait démarrer avant que app et code-sync soient prêts
    depends_on:
      code-sync:
        condition: service_completed_successfully
      app:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - preprod-app-code:/var/www
      - preprod-storage-data:/var/www/storage
      - ./.env:/var/www/.env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - preprod-network
      - keyhome-prod-network
    environment:
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
      - NIGHTWATCH_INGEST_URI=nightwatch-agent:2407

  nightwatch-agent:
    image: laravelphp/nightwatch-agent:latest
    container_name: ${COMPOSE_PREFIX:-keyhome-preprod}-nightwatch-agent
    restart: unless-stopped
    environment:
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
    healthcheck:
      test: php nightwatch-status
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - preprod-network

  web:
    image: nginx:alpine
    container_name: ${COMPOSE_PREFIX:-keyhome-preprod}-web
    restart: unless-stopped
    # FIX: condition service_started → service_healthy pour ne pas accepter de trafic avant que PHP-FPM soit up
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-9091}:80"
    volumes:
      - preprod-app-code:/var/www
      - preprod-storage-data:/var/www/storage
      - .docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - preprod-network
      - traefik-public
    # FIX: healthcheck manquant sur le point d'entrée public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # FIX: labels Traefik manquants — sans eux Traefik ne sait pas router vers ce service
    # et ne peut pas choisir le bon réseau (traefik-public vs preprod-network)
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.keyhome-preprod.rule=Host(`${APP_URL:-api.keyhome.neocraft.dev}`)"
      - "traefik.http.routers.keyhome-preprod.entrypoints=websecure"
      - "traefik.http.routers.keyhome-preprod.tls.certresolver=letsencrypt"
      - "traefik.http.services.keyhome-preprod.loadbalancer.server.port=80"

networks:
  preprod-network:
    driver: bridge
  keyhome-prod-network:
    external: true
    name: keyhome_keyhome-network
  traefik-public:
    external: true

volumes:
  preprod-app-code:
    driver: local
  preprod-storage-data:
    driver: local
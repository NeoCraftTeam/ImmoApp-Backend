services:
  # Service temporaire pour synchroniser le code frais de l'image vers le volume
  # Cela règle le problème des 404 lors des mises à jour
  code-sync:
    image: ${APP_IMAGE:-keyhome-backend}
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-code-sync
    command: sh -c "rm -rf /shared-code/bootstrap/cache/* && cp -rp /var/www/. /shared-code/ && chmod -R 755 /shared-code && chown -R 1000:1000 /shared-code"
    volumes:
      - keyhome-app-code:/shared-code
    networks:
      - keyhome-network

  # L'application Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-keyhome-backend}
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-backend
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      code-sync:
        condition: service_completed_successfully
      db:
        condition: service_healthy   # FIX: attendre que la DB soit prête avant de démarrer
      redis:
        condition: service_healthy   # FIX: attendre que Redis soit prêt avant de démarrer
    env_file:
      - .env
    volumes:
      - keyhome-app-code:/var/www
      - keyhome-storage-data:/var/www/storage
      - ./.env:/var/www/.env
    networks:
      - keyhome-network
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - APP_ENV=${APP_ENV:-production}
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
      - NIGHTWATCH_INGEST_URI=nightwatch-agent:2407
    # FIX: healthcheck sur le process PHP-FPM pour que le web puisse dépendre de app proprement
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'php-fpm' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Le Worker pour les files d'attente (Mails, notifications, etc.)
  worker:
    image: ${APP_IMAGE:-keyhome-backend}
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --queue=emails,default --tries=3 --timeout=90
    # FIX: dépend de code-sync (condition completed) + db/redis healthy
    # Sans ça, le worker peut démarrer sur un volume partiellement peuplé
    depends_on:
      code-sync:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - keyhome-app-code:/var/www
      - keyhome-storage-data:/var/www/storage
      - ./.env:/var/www/.env
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - keyhome-network
    environment:
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
      - NIGHTWATCH_INGEST_URI=nightwatch-agent:2407

  # Laravel Nightwatch Agent (monitoring)
  nightwatch-agent:
    image: laravelphp/nightwatch-agent:latest
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-nightwatch-agent
    restart: unless-stopped
    environment:
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
    healthcheck:
      test: php nightwatch-status
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - keyhome-network

  # Le serveur Web (Nginx)
  web:
    image: nginx:alpine
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-web
    restart: unless-stopped
    # FIX: attendre que app soit healthy (PHP-FPM up) avant d'accepter du trafic
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-9090}:80"
    volumes:
      - keyhome-app-code:/var/www
      - keyhome-storage-data:/var/www/storage
      - .docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - keyhome-network
      - traefik-public
    # FIX: healthcheck sur le port 80 pour surveiller nginx lui-même
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.keyhome-prod.rule=Host(`${APP_DOMAIN:-api.keyhome.app}`)"
      - "traefik.http.routers.keyhome-prod.entrypoints=websecure"
      - "traefik.http.routers.keyhome-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.keyhome-prod.loadbalancer.server.port=80"

  # La base de données (Postgres + PostGIS)
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-keyhome}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - keyhome-db-data:/var/lib/postgresql/data
    networks:
      - keyhome-network
    # FIX: healthcheck manquant — app et worker ne peuvent pas savoir si la DB est prête
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-keyhome}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Cache (Redis)
  redis:
    image: redis:alpine
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-redis
    restart: unless-stopped
    networks:
      - keyhome-network
    # FIX: healthcheck manquant — app et worker ne peuvent pas savoir si Redis est prêt
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Moteur de recherche (Meilisearch)
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-masterKey}
      - MEILI_ENV=production
    volumes:
      - keyhome-meilisearch-data:/meili_data
    networks:
      - keyhome-network
    # FIX: healthcheck sur l'API Meilisearch — utilise 127.0.0.1 (IPv4)
    # car localhost peut se résoudre en ::1 (IPv6) dans certains conteneurs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Interface de gestion de base de données (debug only — use: docker compose --profile debug up pgadmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-pgadmin
    restart: unless-stopped
    profiles:
      - debug
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - keyhome-network

  # --- MONITORING STACK (use: docker compose --profile monitoring up -d) ---

  # Prometheus : Collecte les métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - .docker/monitoring/prometheus:/etc/prometheus
      - keyhome-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - keyhome-network

  # Grafana : Visualisation des données
  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    # Port exposé uniquement en dev. En prod, utilisez un reverse proxy Nginx
    # ports:
    #   - "3000:3000"
    volumes:
      - keyhome-grafana-data:/var/lib/grafana
      - .docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    networks:
      - keyhome-network

  # Node Exporter : Métriques du serveur (CPU, RAM, Disque du VPS)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-node-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - keyhome-network

  # cAdvisor : Métriques de chaque conteneur Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-cadvisor
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - keyhome-network

  # Postgres Exporter : Métriques spécifiques à la DB
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-postgres-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_DATABASE:-keyhome}?sslmode=disable"
    networks:
      - keyhome-network

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter
    container_name: ${COMPOSE_PREFIX:-keyhome-prod}-redis-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      - REDIS_ADDR=redis:6379
    networks:
      - keyhome-network

networks:
  keyhome-network:
    driver: bridge
  traefik-public:
    external: true

volumes:
  keyhome-db-data:
    driver: local
  keyhome-app-code:
    driver: local
  keyhome-storage-data:
    driver: local
  keyhome-prometheus-data:
    driver: local
  keyhome-grafana-data:
    driver: local
  keyhome-meilisearch-data:
    driver: local
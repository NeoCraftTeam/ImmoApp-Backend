server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Upload size aligned with application limits (Spatie Media Library = 10MB + margin)
    client_max_body_size 15M;

    # --- Security Headers (SEC-004) ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # HSTS — uncomment when TLS is terminated at this level (skip if behind Traefik with its own HSTS)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Rate Limiting Zones (PERF-001) ---
    # Defined in http{} block via /etc/nginx/nginx.conf — apply with limit_req below

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 64 16k;
        fastcgi_buffer_size 128k;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    # --- Storage: serve files but BLOCK PHP execution (SEC-003) ---
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri =404;

        location ~* \.php$ {
            deny all;
            return 403;
        }
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
